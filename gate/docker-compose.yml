services:
  gate:
    build: .
    container_name: mindgate-gate
    restart: unless-stopped
    # Port is not exposed to the host for security. Nginx routes traffic directly within the Docker network.
    volumes:
      - ./config:/app/config:ro
    environment:
      - NODE_ENV=production
    networks:
      - mindgate_net

networks:
  mindgate_net:
    driver: bridge

